<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3733"/>
      <stop offset=".4" stop-color="#5a5247"/>
      <stop offset="1" stop-color="#1a1816"/>
    </linearGradient>
    <radialGradient id="light" cx=".5" cy=".25" r=".4">
      <stop offset="0" stop-color="#fff7d6" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fff7d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2826"/>
      <stop offset="1" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0c0d"/>
      <stop offset=".5" stop-color="#1a1a1c"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="reflect" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset=".5" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ceiling -->
  <rect width="1600" height="700" fill="url(#bg)"/>
  <rect width="1600" height="700" fill="url(#light)"/>

  <!-- ceiling lights -->
  <rect x="200" y="120" width="500" height="14" rx="6" fill="#fff8df" opacity=".95"/>
  <rect x="900" y="100" width="380" height="12" rx="5" fill="#fff8df" opacity=".7"/>
  <rect x="1300" y="180" width="200" height="10" rx="4" fill="#fff8df" opacity=".5"/>

  <!-- pillars -->
  <rect x="100" y="350" width="80" height="350" fill="#3f6b4a"/>
  <rect x="80" y="340" width="120" height="40" fill="#56885f"/>
  <rect x="1250" y="400" width="80" height="300" fill="#3f6b4a"/>
  <rect x="1230" y="390" width="120" height="35" fill="#56885f"/>
  <rect x="700" y="380" width="60" height="320" fill="#3f6b4a"/>
  <rect x="680" y="370" width="100" height="32" fill="#56885f"/>

  <!-- floor -->
  <rect y="700" width="1600" height="400" fill="url(#floor)"/>

  <!-- parking lines -->
  <g stroke="#9c8c5e" stroke-width="3" opacity=".35">
    <line x1="0" y1="780" x2="1600" y2="820"/>
    <line x1="0" y1="900" x2="1600" y2="960"/>
  </g>

  <!-- car body -->
  <g transform="translate(800,750)">
    <!-- shadow -->
    <ellipse cx="0" cy="190" rx="540" ry="40" fill="#000" opacity=".6"/>

    <!-- main body -->
    <path d="M-470,80 Q-520,40 -480,-30 L-380,-90 Q-300,-140 -200,-160 L180,-160 Q280,-150 360,-100 L460,-30 Q500,20 470,80 L460,140 Q450,180 410,180 L-410,180 Q-450,180 -460,140 Z" fill="url(#body)"/>

    <!-- roof -->
    <path d="M-300,-150 Q-180,-220 0,-225 Q200,-225 320,-160 L260,-90 L-240,-90 Z" fill="#080809"/>

    <!-- windows -->
    <path d="M-260,-140 Q-160,-195 0,-200 Q180,-200 280,-150 L240,-95 L-220,-95 Z" fill="#1c2530" opacity=".85"/>
    <path d="M-250,-138 Q-150,-185 0,-190" stroke="#5a8fb8" stroke-width="2" fill="none" opacity=".4"/>

    <!-- grille -->
    <path d="M-160,40 L160,40 L130,140 L-130,140 Z" fill="#0a0a0b"/>
    <g stroke="#1a1a1c" stroke-width="2">
      <line x1="-150" y1="55" x2="150" y2="55"/>
      <line x1="-145" y1="75" x2="145" y2="75"/>
      <line x1="-140" y1="95" x2="140" y2="95"/>
      <line x1="-135" y1="115" x2="135" y2="115"/>
    </g>
    <!-- 4 rings -->
    <g transform="translate(0,90)" fill="none" stroke="#c8b18a" stroke-width="3">
      <circle cx="-30" cy="0" r="14"/>
      <circle cx="-10" cy="0" r="14"/>
      <circle cx="10" cy="0" r="14"/>
      <circle cx="30" cy="0" r="14"/>
    </g>

    <!-- headlights -->
    <path d="M-440,-20 L-300,-30 L-280,30 L-440,40 Z" fill="#1a1d22"/>
    <path d="M-430,-10 L-310,-20 L-300,20 L-430,30 Z" fill="#3a4555" opacity=".8"/>
    <path d="M440,-20 L300,-30 L280,30 L440,40 Z" fill="#1a1d22"/>
    <path d="M430,-10 L310,-20 L300,20 L430,30 Z" fill="#3a4555" opacity=".8"/>

    <!-- bumper vents -->
    <rect x="-260" y="155" width="80" height="20" rx="4" fill="#050505"/>
    <rect x="180" y="155" width="80" height="20" rx="4" fill="#050505"/>

    <!-- license plate -->
    <rect x="-60" y="155" width="120" height="28" rx="4" fill="#f5f5f5"/>
    <text x="0" y="175" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#111">HD-376-VA</text>

    <!-- shine reflection -->
    <path d="M-470,80 Q-520,40 -480,-30 L-380,-90 Q-300,-140 -200,-160 L180,-160 Q280,-150 360,-100 L460,-30 Q500,20 470,80 L460,140 Q450,180 410,180 L-410,180 Q-450,180 -460,140 Z" fill="url(#reflect)" opacity=".5"/>

    <!-- wheels -->
    <g transform="translate(-310,140)">
      <circle r="80" fill="#0a0a0b"/>
      <circle r="68" fill="#1a1a1c"/>
      <circle r="55" fill="#0e0e10"/>
      <g stroke="#3a3a3d" stroke-width="3" fill="none">
        <line x1="-50" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="-50" x2="0" y2="50"/>
        <line x1="-35" y1="-35" x2="35" y2="35"/>
        <line x1="-35" y1="35" x2="35" y2="-35"/>
      </g>
      <circle r="14" fill="#1c1c1e"/>
    </g>
    <g transform="translate(310,140)">
      <circle r="80" fill="#0a0a0b"/>
      <circle r="68" fill="#1a1a1c"/>
      <circle r="55" fill="#0e0e10"/>
      <g stroke="#3a3a3d" stroke-width="3" fill="none">
        <line x1="-50" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="-50" x2="0" y2="50"/>
        <line x1="-35" y1="-35" x2="35" y2="35"/>
        <line x1="-35" y1="35" x2="35" y2="-35"/>
      </g>
      <circle r="14" fill="#1c1c1e"/>
    </g>
  </g>
</svg>
