<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#020308"/>
      <stop offset=".5" stop-color="#080a14"/>
      <stop offset="1" stop-color="#1a1d2c"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1d24"/>
      <stop offset=".5" stop-color="#0e1015"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <radialGradient id="hl" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff" stop-opacity="1"/>
      <stop offset=".4" stop-color="#cfe5ff" stop-opacity=".7"/>
      <stop offset="1" stop-color="#cfe5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f3"/>
      <stop offset=".5" stop-color="#e0dfd9"/>
      <stop offset="1" stop-color="#a8a7a2"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="600" fill="url(#sky)"/>

  <!-- distant city lights -->
  <g fill="#ffd47a" opacity=".75">
    <circle cx="200" cy="450" r="2"/><circle cx="240" cy="445" r="2"/>
    <circle cx="320" cy="455" r="2.5"/><circle cx="380" cy="448" r="2"/>
    <circle cx="450" cy="452" r="2"/><circle cx="520" cy="445" r="2"/>
    <circle cx="900" cy="455" r="2"/><circle cx="960" cy="448" r="2.5"/>
    <circle cx="1050" cy="452" r="2"/><circle cx="1140" cy="445" r="2"/>
    <circle cx="1240" cy="450" r="2"/><circle cx="1320" cy="448" r="2"/>
  </g>

  <!-- street lamps -->
  <g stroke="#444" stroke-width="3">
    <line x1="100" y1="280" x2="100" y2="600"/>
    <line x1="1500" y1="280" x2="1500" y2="600"/>
    <line x1="320" y1="320" x2="320" y2="600"/>
    <line x1="1280" y1="320" x2="1280" y2="600"/>
  </g>
  <g fill="#fff7c2">
    <circle cx="100" cy="275" r="6"/>
    <circle cx="1500" cy="275" r="6"/>
    <circle cx="320" cy="315" r="5"/>
    <circle cx="1280" cy="315" r="5"/>
  </g>
  <g fill="#fff7c2" opacity=".15">
    <circle cx="100" cy="275" r="40"/>
    <circle cx="1500" cy="275" r="40"/>
    <circle cx="320" cy="315" r="30"/>
    <circle cx="1280" cy="315" r="30"/>
  </g>

  <!-- road -->
  <rect y="600" width="1600" height="500" fill="url(#road)"/>

  <!-- lane markings -->
  <g fill="#e8e6e3" opacity=".5">
    <rect x="40" y="700" width="120" height="10"/>
    <rect x="40" y="850" width="160" height="14"/>
    <rect x="40" y="1020" width="220" height="18"/>
    <rect x="1440" y="700" width="120" height="10"/>
    <rect x="1400" y="850" width="160" height="14"/>
    <rect x="1340" y="1020" width="220" height="18"/>
  </g>

  <!-- traffic signs -->
  <g transform="translate(560,470)">
    <rect x="-3" y="0" width="6" height="180" fill="#3a3a3a"/>
    <circle cx="0" cy="-30" r="50" fill="#c92a2a" stroke="#fff" stroke-width="6"/>
    <rect x="-30" y="-38" width="60" height="16" fill="#fff"/>
  </g>
  <g transform="translate(680,460)">
    <rect x="-3" y="0" width="6" height="190" fill="#3a3a3a"/>
    <rect x="-45" y="-50" width="90" height="90" rx="10" fill="#1864ab" stroke="#fff" stroke-width="6"/>
    <path d="M-15,-10 L25,5 L-15,20 L-5,5 Z" fill="#fff"/>
  </g>
  <g transform="translate(620,560)">
    <rect x="-30" y="0" width="60" height="180" fill="#fff"/>
    <g fill="#c92a2a">
      <rect x="-30" y="0" width="60" height="22" transform="skewY(8)"/>
      <rect x="-30" y="50" width="60" height="22" transform="skewY(8)"/>
      <rect x="-30" y="100" width="60" height="22" transform="skewY(8)"/>
      <rect x="-30" y="150" width="60" height="22" transform="skewY(8)"/>
    </g>
  </g>

  <!-- car -->
  <g transform="translate(800,830)">
    <!-- shadow -->
    <ellipse cx="0" cy="180" rx="500" ry="32" fill="#000" opacity=".7"/>

    <!-- headlight glow -->
    <circle cx="-340" cy="20" r="180" fill="url(#hl)" opacity=".8"/>
    <circle cx="340" cy="20" r="180" fill="url(#hl)" opacity=".8"/>
    <ellipse cx="0" cy="280" rx="640" ry="60" fill="#cfe5ff" opacity=".15"/>

    <!-- body -->
    <path d="M-440,80 Q-490,40 -460,-30 L-360,-90 Q-280,-150 -180,-170 L180,-170 Q280,-150 360,-90 L460,-30 Q490,20 460,80 L450,140 Q440,180 400,180 L-400,180 Q-440,180 -450,140 Z" fill="url(#white)"/>

    <!-- roof / windshield -->
    <path d="M-280,-160 Q-150,-220 0,-225 Q160,-220 280,-160 L240,-100 L-240,-100 Z" fill="#080808"/>
    <path d="M-260,-150 Q-140,-200 0,-205 Q150,-200 260,-150 L230,-110 L-230,-110 Z" fill="#1c1f24" opacity=".9"/>

    <!-- mercedes star -->
    <g transform="translate(0,90)">
      <circle r="32" fill="none" stroke="#1a1a1a" stroke-width="3"/>
      <g stroke="#1a1a1a" stroke-width="4" fill="none">
        <line x1="0" y1="0" x2="0" y2="-26"/>
        <line x1="0" y1="0" x2="22" y2="14"/>
        <line x1="0" y1="0" x2="-22" y2="14"/>
      </g>
    </g>

    <!-- grille -->
    <path d="M-130,40 L130,40 L120,80 L-120,80 Z" fill="#0a0a0b"/>
    <g stroke="#3a3a3a" stroke-width="2">
      <line x1="-120" y1="50" x2="120" y2="50"/>
      <line x1="-115" y1="62" x2="115" y2="62"/>
      <line x1="-110" y1="74" x2="110" y2="74"/>
    </g>

    <!-- AMG bumper -->
    <path d="M-440,140 L-260,140 L-220,180 L-440,180 Z" fill="#0a0a0a"/>
    <path d="M440,140 L260,140 L220,180 L440,180 Z" fill="#0a0a0a"/>

    <!-- headlight housings -->
    <g>
      <ellipse cx="-340" cy="20" rx="100" ry="28" fill="#0a0a0b"/>
      <ellipse cx="-340" cy="20" rx="80" ry="20" fill="url(#hl)"/>
      <ellipse cx="340" cy="20" rx="100" ry="28" fill="#0a0a0b"/>
      <ellipse cx="340" cy="20" rx="80" ry="20" fill="url(#hl)"/>
    </g>

    <!-- DRL strip -->
    <rect x="-360" y="100" width="60" height="6" rx="3" fill="#cfe5ff"/>
    <rect x="300" y="100" width="60" height="6" rx="3" fill="#cfe5ff"/>

    <!-- license -->
    <rect x="-60" y="115" width="120" height="22" rx="3" fill="#f5f5f5"/>

    <!-- shine -->
    <path d="M-440,80 Q-490,40 -460,-30 L-360,-90 Q-280,-150 -180,-170 L180,-170 Q280,-150 360,-90 L460,-30 Q490,20 460,80" fill="#fff" opacity=".18"/>

    <!-- wheels -->
    <g transform="translate(-300,140)">
      <circle r="70" fill="#0a0a0b"/>
      <circle r="58" fill="#181818"/>
      <g stroke="#404040" stroke-width="2.5" fill="none">
        <line x1="-46" y1="0" x2="46" y2="0"/>
        <line x1="0" y1="-46" x2="0" y2="46"/>
        <line x1="-32" y1="-32" x2="32" y2="32"/>
        <line x1="-32" y1="32" x2="32" y2="-32"/>
      </g>
      <circle r="12" fill="#222"/>
    </g>
    <g transform="translate(300,140)">
      <circle r="70" fill="#0a0a0b"/>
      <circle r="58" fill="#181818"/>
      <g stroke="#404040" stroke-width="2.5" fill="none">
        <line x1="-46" y1="0" x2="46" y2="0"/>
        <line x1="0" y1="-46" x2="0" y2="46"/>
        <line x1="-32" y1="-32" x2="32" y2="32"/>
        <line x1="-32" y1="32" x2="32" y2="-32"/>
      </g>
      <circle r="12" fill="#222"/>
    </g>
  </g>
</svg>
